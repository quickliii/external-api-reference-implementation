<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Quickli External API Tools</title>
    <script>
      (function () {
        var stored = localStorage.getItem('quickli-theme');
        var isDark = stored ? stored === 'dark' : true;
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body class="bg-white dark:bg-navy-900 text-slate-800 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
